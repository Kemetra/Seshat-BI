# Metric contract -- DiscountedTransactionRate (filled instance for retail_store_sales)
# F009 define-layer. BLOCKED: the denominator/numerator depend on the Q2 ruling about
# what a BLANK discount_applied means -- a human judgment call (Principle V).

name: "DiscountedTransactionRate"
grain: "a RATIO valid at any rollup; recomputed at the current filter grain. NOT additive."
formula_intent: >-
  The share of transactions that had a discount applied -- transactions with
  discount_applied = TRUE divided by ALL transactions (denominator = the full
  transaction count, 12,575). PER OWNER RULING (2026-06-25): unknown discount status
  (NULL, 33.39% / 4,199 rows) is counted as NOT-DISCOUNTED in the denominator. On the
  current data this is 4,219 / 12,575 = 33.55%.
  CAVEAT (material -- carry to any dashboard): this UNDERSTATES the true discount rate,
  because 33% of transactions have an UNKNOWN (not confirmed-False) discount status. The
  rate among transactions with a KNOWN status is 50.37% (4,219 / 8,376). The 33.55%
  figure assumes every unknown was un-discounted, which is a floor, not the true rate.
owner: "<metric owner -- the user, acting as data owner>"
binds_to:
  gold_table: "gold.fct_sales_rss"
  columns:
    - "discount_applied"
    - "transaction_id"
  pii_sensitive: false

readiness:
  status: "pass"
  evidence:
    - "approved by data_owner on 2026-06-25 (ruled: include unknowns as not-discounted; denominator = all transactions)"
    - "rate = 4,219 / 12,575 = 33.55% on gold.fct_sales_rss"
  blocking_reasons: []
