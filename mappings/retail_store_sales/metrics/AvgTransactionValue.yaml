# Metric contract -- AvgTransactionValue (filled instance for retail_store_sales)
# F009 define-layer. PROPOSAL: status not_started until the metric owner approves.
# A ratio metric: NOT additive -- it must be recomputed at each grain, never summed.

name: "AvgTransactionValue"
grain: "a RATIO valid at any rollup; recomputed at the current filter grain (TotalSales / TransactionCount). NOT additive -- never pre-aggregate or sum it."
formula_intent: "The average money taken per transaction within the current filter -- total sales divided by the number of transactions. A ratio, so it must be computed as (sum of total_spent) / (count of transactions) at the display grain, never averaged-of-averages."
owner: "<metric owner -- the user, acting as data owner>"
binds_to:
  gold_table: "gold.fct_sales_rss"
  columns:
    - "total_spent"
    - "transaction_id"
  pii_sensitive: false

readiness:
  status: "not_started"
  evidence:
    - "derived from TotalSales / TransactionCount (both bind to gold.fct_sales_rss, validated 2026-06-25)"
  blocking_reasons: []
