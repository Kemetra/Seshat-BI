# Spec 121 (Business Knowledge Interview + Decision Store). A GENERIC, copy-me
# blank. The FILLED copy lives in the project workspace at
# `.seshat/semantic-decisions.yaml` and records grain, primary key,
# relationship/cardinality, PII handling, data exclusion, dashboard-blueprint
# approval, and publish/export decisions.
#
# SHAPE (see specs/121-business-knowledge-interview/contracts/decision-record.schema.json)
#   top level: { decisions: [ ... ], batches: [ ... ] }   # batches optional here
#
# THE NINE STATUSES: proposed | approved | rejected | pending | needs_user_input
#                    | needs_sample | blocked | deferred | superseded
#   - confidence (low|medium|high) is the agent's PROPOSAL confidence ONLY; it is
#     never approval and never a readiness signal.
#   - approved records are IMMUTABLE: change them only by a superseding record.
#   - an approved critical decision MUST carry full approval metadata incl.
#     evidence_identity captured at approval time (the staleness comparator).
#
# NO RAW PII: never write a raw suspected-PII value into this file; cite masked
# evidence artifacts instead.
#
# C086 IS A FILLED INSTANCE, NEVER THE SCHEMA: the record below is an obvious
# placeholder. Do not copy any worked-example specifics.
# =============================================================================

